name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  # PHP Tests
  php-tests:
    runs-on: ubuntu-latest
    
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: testpassword
          MYSQL_DATABASE: ecommerce_chatbot_test
        options: --health-cmd="mysqladmin ping" --health-timeout=5s --health-retries=3
        ports:
          - 3306:3306
    
    steps:
      - uses: actions/checkout@v3
      
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: mysqli, pdo, pdo_mysql
          coverage: xdebug
      
      - name: Install Composer dependencies
        run: composer install --no-progress --prefer-dist --optimize-autoloader
      
      - name: Run PHPUnit tests
        run: ./vendor/bin/phpunit --coverage-clover=coverage.xml
        env:
          DB_HOST: 127.0.0.1
          DB_USER: root
          DB_PASS: testpassword
          DB_NAME: ecommerce_chatbot_test
      
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v3
        with:
          file: ./coverage.xml
          flags: php
  
  # Python ML Tests
  python-ml-tests:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v3
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        working-directory: ./chatbot-ml
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov
      
      - name: Run ML tests
        working-directory: ./chatbot-ml
        run: |
          pytest tests/ --cov=. --cov-report=xml
      
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v3
        with:
          file: ./chatbot-ml/coverage.xml
          flags: ml-api
  
  # Security Scan
  security-scan:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v3
      
      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      
      - name: PHP Security Audit
        run: |
          composer require --dev sensiolabs/security-checker
          php vendor/bin/security-checker security:check
      
      - name: Python Security Audit
        working-directory: ./chatbot-ml
        run: |
          pip install safety
          safety check -r requirements.txt
  
  # Docker Build
  docker-build:
    runs-on: ubuntu-latest
    needs: [php-tests, python-ml-tests]
    
    steps:
      - uses: actions/checkout@v3
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2
      
      - name: Build PHP container
        uses: docker/build-push-action@v4
        with:
          context: .
          file: ./Dockerfile
          push: false
          tags: ecommerce-chatbot/app:latest
      
      - name: Build ML API container
        uses: docker/build-push-action@v4
        with:
          context: ./chatbot-ml
          file: ./Dockerfile.ml
          push: false
          tags: ecommerce-chatbot/ml-api:latest
  
  # Deploy to Staging (if on develop branch)
  deploy-staging:
    runs-on: ubuntu-latest
    needs: [docker-build]
    if: github.ref == 'refs/heads/develop'
    
    steps:
      - uses: actions/checkout@v3
      
      - name: Deploy to staging server
        run: |
          echo "Deploying to staging environment..."
          # Add your deployment commands here (SSH, rsync, etc.)
  
  # Deploy to Production (if on main branch)
  deploy-production:
    runs-on: ubuntu-latest
    needs: [docker-build]
    if: github.ref == 'refs/heads/main'
    
    steps:
      - uses: actions/checkout@v3
      
      - name: Deploy to production server
        run: |
          echo "Deploying to production environment..."
          # Add your deployment commands here (SSH, kubectl, etc.)
