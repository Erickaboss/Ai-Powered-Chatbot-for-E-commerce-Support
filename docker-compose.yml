version: '3.8'

services:
  # MySQL Database
  db:
    image: mysql:8.0
    container_name: ecommerce_db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASS:-rootpassword}
      MYSQL_DATABASE: ${DB_NAME:-ecommerce_chatbot}
      MYSQL_USER: ${DB_USER:-ecommerce_user}
      MYSQL_PASSWORD: ${DB_PASS:-userpassword}
    ports:
      - "${DB_PORT:-3306}:3306"
    volumes:
      - db_data:/var/lib/mysql
      - ./database.sql:/docker-entrypoint-initdb.d/database.sql
    networks:
      - ecommerce_network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10

  # PHP Application
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ecommerce_app
    restart: unless-stopped
    ports:
      - "${APP_PORT:-8080}:80"
    environment:
      DB_HOST: db
      DB_USER: ${DB_USER:-ecommerce_user}
      DB_PASS: ${DB_PASS:-userpassword}
      DB_NAME: ${DB_NAME:-ecommerce_chatbot}
    volumes:
      - ./:/var/www/html
      - ./logs:/var/www/html/logs
    depends_on:
      db:
        condition: service_healthy
    networks:
      - ecommerce_network

  # Python Flask ML API
  ml-api:
    build:
      context: ./chatbot-ml
      dockerfile: ../Dockerfile.ml
    container_name: ecommerce_ml_api
    restart: unless-stopped
    ports:
      - "${ML_PORT:-5000}:5000"
    volumes:
      - ./chatbot-ml:/app
    environment:
      FLASK_ENV: development
      PYTHONUNBUFFERED: 1
    networks:
      - ecommerce_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      timeout: 10s
      retries: 5

  # Redis Cache (optional)
  redis:
    image: redis:7-alpine
    container_name: ecommerce_redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    command: redis-server --requirepass ${REDIS_PASSWORD:-redispassword}
    volumes:
      - redis_data:/data
    networks:
      - ecommerce_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      timeout: 3s
      retries: 5

  # Nginx Reverse Proxy (optional for production)
  nginx:
    image: nginx:alpine
    container_name: ecommerce_nginx
    restart: unless-stopped
    ports:
      - "${NGINX_PORT:-80}:80"
      - "${NGINX_SSL_PORT:-443}:443"
    volumes:
      - ./docker/nginx.conf:/etc/nginx/nginx.conf
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      - app
    networks:
      - ecommerce_network
    profiles:
      - production

volumes:
  db_data:
  redis_data:

networks:
  ecommerce_network:
    driver: bridge
